# Production values for nats-production namespace on OKD (Snapp teh-2).
# Deploy:
#   helm upgrade --install cheshmhayash \
#     oci://ghcr.io/1995parham/cheshmhayash-chart --version 1.0.0 \
#     -n nats-production -f deploy/nats-production.values.yaml

image:
  repository: ghcr.io/1995parham/cheshmhayash
  tag: "0.5.1"
  pullPolicy: IfNotPresent

replicaCount: 2

# OpenShift's restricted-v2 SCC assigns UIDs from a per-namespace range
# (nats-production: 1001150000/10000). Clear the hard-coded uids so the
# SCC mutating admission picks from that range. `runAsNonRoot` stays on.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

clusters:
  - name: prod
    url: nats://js-nats-production.nats-production.svc.cluster.local:4222
    requestTimeoutMs: 5000
    discoveryTimeoutMs: 1500
    auth:
      existingSecret:
        # Reuse the existing platform Secret rather than minting a new one.
        name: nats-system-account
        userKey: admin_username
        passwordKey: admin_password

# Vanilla Ingress is off — Snappcloud routes via Contour HTTPProxy.
ingress:
  enabled: false

# Internal HTTPS reach via the cluster's Contour "private" shard plus the
# delegated wildcard letsencrypt cert.
httpProxy:
  enabled: true
  ingressClassName: private
  fqdn: cheshmhayash.apps.private.okd4.teh-2.snappcloud.io
  tls:
    secretName: openshift-ingress/letsencrypt
    enableFallbackCertificate: true
  timeoutPolicy:
    idleConnection: 30s

# Cluster-wide NetworkPolicy story isn't established here — leave off.
networkPolicy:
  enabled: false

# Already-default but pin for clarity.
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# No HPA yet — the panel is read-mostly with a 5-cluster footprint; CPU
# never hits anything close to a threshold.
autoscaling:
  enabled: false
