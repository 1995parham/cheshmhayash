[server]
host = "0.0.0.0"
port = 1378

# Each [[nats]] block describes a NATS cluster to manage. The `url` is the
# client port. Administrative endpoints ($SYS.REQ.*) require the connection
# to be authenticated against the system account — supply either a creds
# file or user/password below.
[[nats]]
name = "local"
url = "nats://127.0.0.1:4222"
