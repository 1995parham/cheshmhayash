# Dependabot keeps every dependency surface current and opens grouped PRs.
# Minor + patch bumps are batched into a single PR per ecosystem each week to
# cut noise; major bumps come as their own PRs so they get individual review.
# Commit prefixes match the repo's conventional-commit style so CI/changelogs
# stay consistent.
version: 2
updates:
  # ---- Go modules (root go.mod) --------------------------------------------
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      go-minor-patch:
        update-types:
          - minor
          - patch

  # ---- Frontend npm packages (frontend/package.json) -----------------------
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # ---- GitHub Actions used by the workflows --------------------------------
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        patterns:
          - "*"

  # ---- Dockerfile base images (node / go / distroless) ---------------------
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(docker)"
