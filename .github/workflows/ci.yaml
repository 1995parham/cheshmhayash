---
name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: backend / lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          check-latest: true

      - name: go vet
        run: go vet ./...

      - name: go fmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          args: --timeout=5m

  backend-test:
    name: backend / build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
          check-latest: true

      - name: build
        run: go build ./...

      - name: test
        run: go test -race -count=1 ./...

  frontend:
    name: frontend / typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: install
        run: npm ci

      - name: typecheck
        run: npm run typecheck

      - name: build
        run: npm run build

      - name: upload bundle
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error
          retention-days: 7

  docker:
    name: docker / build (smoke test)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend]
    # Skip on main pushes — release.yaml builds + pushes there.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: download frontend bundle
        uses: actions/download-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist

      - name: setup buildx
        uses: docker/setup-buildx-action@v4

      - name: build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: cheshmhayash:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    name: helm / lint + template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: setup helm
        uses: azure/setup-helm@v5
        with:
          version: v4.1.4

      - name: helm lint
        run: helm lint chart/cheshmhayash

      - name: helm template (defaults)
        run: helm template cheshmhayash chart/cheshmhayash > /dev/null
