---
name: release

# Build + push images to GHCR on every push to main (rolling :main + :sha tags)
# and on every semver tag (:vX.Y.Z + :X + :latest). Tagged releases also publish
# the Helm chart as an OCI artifact and attach a cosign signature + SBOM.

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write     # ghcr.io push
  id-token: write     # cosign keyless signing via OIDC
  attestations: write # in-toto attestations

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-frontend:
    name: build frontend bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --no-audit --no-fund
        working-directory: frontend

      - run: npm run build
        working-directory: frontend

      - name: upload bundle
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error
          retention-days: 1

  image:
    name: build & push image
    runs-on: ubuntu-latest
    needs: build-frontend
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v7

      - name: download frontend bundle
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend/dist

      - name: setup QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@v4

      - name: setup buildx
        uses: docker/setup-buildx-action@v4

      - name: log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: derive tags + labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Tagging policy:
          #   push to main         → :main, :sha-abc1234
          #   tag v1.2.3           → :1.2.3, :1.2, :1, :latest
          #   PRs (if enabled)     → :pr-N
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !startsWith(github.ref, 'refs/tags/v0.') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=cheshmhayash
            org.opencontainers.image.description=NATS administration dashboard over the NATS protocol.
            org.opencontainers.image.vendor=1995parham
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}/blob/main/README.md

      - name: build & push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Stamps the binary so /api/version + MCP initialize report the
          # tag (e.g. "v1.2.3") instead of falling back to "dev". For
          # non-tag pushes github.ref_name is the branch name ("main"),
          # which is fine — it tells operators they're on a rolling build.
          build-args: |
            VERSION=${{ github.ref_name }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  sign:
    name: sign image (cosign)
    runs-on: ubuntu-latest
    needs: image
    # Only sign for branch pushes / tags, never for PRs.
    if: github.event_name != 'pull_request'
    steps:
      - name: install cosign
        uses: sigstore/cosign-installer@v3

      - name: log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: keyless sign image
        env:
          TAGS: ${{ needs.image.outputs.tags }}
          DIGEST: ${{ needs.image.outputs.digest }}
        run: |
          # cosign keyless signs every tag we just pushed using the
          # workflow's OIDC token. The signature lands as a co-located
          # OCI artifact on ghcr.io alongside the image.
          #
          # SBOM + provenance attestations are produced by the build job's
          # docker/build-push-action (sbom: true, provenance: mode=max) and
          # ship with the image manifest — no separate attest step needed.
          for tag in $TAGS; do
            ref="${tag%:*}@${DIGEST}"
            echo "::group::cosign sign $ref"
            cosign sign --yes "$ref"
            echo "::endgroup::"
          done

  chart:
    name: publish Helm chart (OCI)
    runs-on: ubuntu-latest
    needs: image
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v7

      - name: setup helm
        uses: azure/setup-helm@v5
        with:
          version: v4.1.4

      - name: log in to ghcr.io (helm registry)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: package chart
        run: |
          # Sync chart appVersion to the released tag (strip leading 'v').
          version="${GITHUB_REF_NAME#v}"
          sed -i -E "s/^appVersion:.*/appVersion: \"${version}\"/" chart/cheshmhayash-chart/Chart.yaml
          helm package chart/cheshmhayash-chart --destination dist

      - name: push chart to ghcr.io
        # Result: ghcr.io/<owner>/cheshmhayash-chart:<version>
        # (helm push appends the chart's name from Chart.yaml as the final
        # repository path segment.)
        run: |
          helm push dist/cheshmhayash-chart-*.tgz oci://ghcr.io/${{ github.repository_owner }}
