[server]
host = "0.0.0.0"
port = 1378
{{ range .Values.config.servers }}
[[nats]]
name = {{ .name | quote }}
url = {{ .url | quote }}
{{- with .credsFile }}
creds_file = {{ . | quote }}
{{- end }}
{{- with .user }}
user = {{ . | quote }}
{{- end }}
{{- with .password }}
password = {{ . | quote }}
{{- end }}
{{ end }}
