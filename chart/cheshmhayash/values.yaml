# Default values for cheshmhayash.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: 1995parham/cheshmhayash
  pullPolicy: Always
  # Overrides the image tag whose default is the chart appVersion.
  tag: latest

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

podAnnotations: {}

service:
  type: ClusterIP
  port: 1378

ingress:
  enabled: false
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths: []
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 32Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

config:
  # List of NATS clusters to administer. Each entry becomes a `[[nats]]`
  # block in the mounted settings.toml. `url` is the client port;
  # administrative endpoints require system-account credentials (either a
  # creds file mounted into the pod or user/password).
  servers:
    - name: local
      url: nats://nats.default.svc.cluster.local:4222
      # credsFile: /etc/cheshmhayash/sys.creds
      # user: sys
      # password: changeme
