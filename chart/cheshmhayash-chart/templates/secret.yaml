{{- if eq (include "cheshmhayash-chart.hasSecret" .) "true" -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cheshmhayash-chart.secretName" . }}
  labels:
    {{- include "cheshmhayash-chart.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $i, $c := .Values.clusters }}
  {{- if and $c.auth $c.auth.userPassword }}
  {{ $c.name }}-user: {{ $c.auth.userPassword.user | quote }}
  {{ $c.name }}-password: {{ $c.auth.userPassword.password | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.auth.enabled }}
  {{- if .Values.auth.oidc.clientSecret }}
  oidc-client-secret: {{ .Values.auth.oidc.clientSecret | quote }}
  {{- end }}
  {{- if .Values.auth.session.secret }}
  session-secret: {{ .Values.auth.session.secret | quote }}
  {{- end }}
  {{- end }}
  {{- range $i, $k := .Values.auth.mcpKeys }}
  {{- if $k.value }}
  mcp-key-{{ $i }}: {{ $k.value | quote }}
  {{- end }}
  {{- end }}
{{- end }}
