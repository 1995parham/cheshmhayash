# Default values for the cheshmhayash chart.
# Reference: https://helm.sh/docs/chart_best_practices/values/

# ---- image -----------------------------------------------------------------
image:
  repository: ghcr.io/1995parham/cheshmhayash
  # Override the image tag (defaults to .Chart.AppVersion when empty).
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# ---- naming ----------------------------------------------------------------
# The chart artifact is published as `cheshmhayash-chart` so it sits next to
# the image package on ghcr.io. The override below keeps rendered resource
# names short (e.g. Deployment `cheshmhayash` not `cheshmhayash-chart`).
nameOverride: cheshmhayash
fullnameOverride: ""

# ---- workload --------------------------------------------------------------
replicaCount: 2

# Update strategy for the Deployment. RollingUpdate is the only sensible
# default for a stateless HTTP gateway.
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

revisionHistoryLimit: 5

# Optional priorityClassName (e.g. system-cluster-critical for a control-plane
# adjacent dashboard).
priorityClassName: ""

# ---- serviceAccount --------------------------------------------------------
serviceAccount:
  create: true
  # Provide a name to reuse an existing ServiceAccount. When empty and
  # `create: true`, the chart generates one from the release name.
  name: ""
  annotations: {}
  # cheshmhayash does not call the Kubernetes API. Off by default.
  automountServiceAccountToken: false

# ---- pod security ----------------------------------------------------------
# Pod-level securityContext — satisfies the Restricted Pod Security Standard
# without pinning uid/gid (OpenShift's restricted-v2 SCC injects them from
# the namespace's allowed range; vanilla Kubernetes inherits the
# distroless:nonroot image's baked-in 65532 when nothing is set).
# To pin them anyway:
#   podSecurityContext:
#     runAsUser: 65532
#     runAsGroup: 65532
#     fsGroup: 65532
#     fsGroupChangePolicy: OnRootMismatch
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Container-level securityContext.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  privileged: false
  capabilities:
    drop:
      - ALL

# ---- resources -------------------------------------------------------------
# Modest defaults that fit a ~10 MB binary. Tune per cluster.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    # CPU limits often hurt latency under load — omit unless required.
    memory: 128Mi

# ---- probes ----------------------------------------------------------------
# All three probes hit /healthz on the HTTP port. The startup probe gates
# the others so a slow first boot does not get killed by livenessProbe.
probes:
  startup:
    enabled: true
    periodSeconds: 5
    failureThreshold: 30
    timeoutSeconds: 2
  readiness:
    enabled: true
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
    successThreshold: 1
  liveness:
    enabled: true
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3

# ---- scheduling ------------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}

# Spread replicas across zones / nodes. Keys are templated as topology keys
# directly; use [] to disable.
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    # labelSelector is appended automatically by the template using the
    # standard selectorLabels.

podAnnotations: {}
podLabels: {}

# ---- networking ------------------------------------------------------------
service:
  type: ClusterIP
  port: 1378
  # Use a specific nodePort/targetPort if you switch type: NodePort.
  annotations: {}

# ---- MCP server ------------------------------------------------------------
# The MCP server is a separate binary (cheshmhayash-mcp). The dashboard no
# longer serves /mcp; enable this to run the Streamable HTTP transport as its
# own Deployment + Service. It reuses the same image, settings.toml and NATS
# auth; /mcp auth is configured under `auth.mcpKeys` / `auth.mcpOauth` /
# `auth.mcpJwt` below (shared settings). Write tools are off unless
# `mcp.write: true` (sets CHESHMHAYASH_MCP_WRITE=1).
#
# Pod security, serviceAccount, image, probes and update strategy are shared
# with the dashboard; scheduling (nodeSelector/affinity/tolerations) and
# resources fall back to the dashboard values when left empty.
mcp:
  enabled: false
  replicaCount: 1
  # Container + Service port for the HTTP transport (passed as `-addr :PORT`).
  port: 8080
  # Register the destructive MCP tools (purge/delete/kick/reload/stepdown).
  write: false
  service:
    type: ClusterIP
    port: 8080
    annotations: {}
  # Defaults to the top-level `resources` when empty.
  resources: {}
  podAnnotations: {}
  podLabels: {}
  extraEnv: []
  # Default to the top-level scheduling values when empty.
  nodeSelector: {}
  affinity: {}
  tolerations: []
  # Spread MCP replicas across nodes/zones. Falls back to the top-level
  # `topologySpreadConstraints` when empty; set to [] there too to disable.
  topologySpreadConstraints: []
  # Keep at least one MCP pod available during voluntary disruptions (node
  # drains, rollouts). Only rendered when `mcp.replicaCount > 1` — a PDB with
  # minAvailable: 1 on a single replica would block every drain.
  podDisruptionBudget:
    enabled: true
    # Either minAvailable or maxUnavailable (mutually exclusive).
    minAvailable: 1
    # maxUnavailable: 1

# --- ingress routing ------------------------------------------------------
# The chart ships two ingress mechanisms; enable whichever fits your cluster.
# Don't enable both with the same hostname — most controllers (including
# Contour) will pick a winner unpredictably.
#
#   ingress.*   — vanilla networking.k8s.io/v1 Ingress. Works on
#                 nginx-ingress, AWS ALB, GCE, OpenShift route-from-ingress,
#                 Contour, Traefik, …
#   httpProxy.* — Contour-native projectcontour.io/v1 HTTPProxy. Use this
#                 when you need Contour features that Ingress can't express
#                 (cross-namespace TLS delegation, includes, weighted
#                 services, retries, request mirroring, …).
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: cheshmhayash.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: cheshmhayash-tls
  #   hosts:
  #     - cheshmhayash.local

# Contour HTTPProxy (projectcontour.io/v1). Use this on clusters that run
# Contour as the ingress controller (e.g. Snappcloud's OKD clusters) where
# Contour-specific features beat plain Ingress.
httpProxy:
  enabled: false
  # IngressClass / Contour shard. Snappcloud private: "private",
  # public: "public", inter-dc: "inter-dc", inter-venture: "inter-venture".
  ingressClassName: ""
  # Required when enabled. The FQDN browsers will hit.
  fqdn: ""
  annotations: {}
  # TLS uses a Secret reference that supports cross-namespace delegated
  # certs in Contour (e.g. "openshift-ingress/letsencrypt").
  tls:
    secretName: ""
    enableFallbackCertificate: true
  # corsPolicy: {}
  # timeoutPolicy:
  #   idleConnection: 30s
  # Full custom routes — overrides the default single root route to
  # cheshmhayash:service.port when set.
  routes: []

# Network policy is opt-in and only useful when your cluster runs a
# NetworkPolicy controller (Calico, Cilium, etc.). When enabled, allow
# ingress from the listed selectors and egress to your NATS endpoints.
networkPolicy:
  enabled: false
  ingress:
    # Selectors allowed to call cheshmhayash on `service.port`. Empty
    # means "allow all" (only meaningful with namespace-default deny).
    fromNamespaceSelector: {}
    fromPodSelector: {}
  egress:
    # CIDRs or selectors that contain your NATS server(s). Required when
    # the chart's default deny-all egress rule is left enabled.
    natsCidrs: []
    natsPorts:
      - 4222
    # Always allow cluster DNS so service-name URLs (e.g.
    # nats.nats.svc.cluster.local) resolve.
    allowDNS: true

# ---- horizontal pod autoscaler --------------------------------------------
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 75
  # targetMemoryUtilizationPercentage: 80
  behavior: {}

# ---- pod disruption budget -------------------------------------------------
podDisruptionBudget:
  enabled: true
  # Either minAvailable or maxUnavailable (mutually exclusive).
  minAvailable: 1
  # maxUnavailable: 1

# ---- application configuration --------------------------------------------
server:
  # The bind host inside the container. Almost always 0.0.0.0.
  host: 0.0.0.0
  # Container port. Used by the Service `targetPort` and all three probes.
  port: 1378

# Each entry below becomes a `[[nats]]` block in the rendered settings.toml.
# `auth` is optional and accepts exactly one of three shapes:
#
#   userPassword:
#     user: admin
#     password: changeme       # chart writes a Secret containing this
#
#   existingSecret:                                  (recommended)
#     name: nats-admin-creds
#     userKey: user
#     passwordKey: password
#
#   credsFileSecret:                                 (preferred for nkey/JWT)
#     name: nats-sys-creds
#     key: sys.creds            # file is mounted read-only into the pod
#
clusters:
  - name: local
    url: nats://nats.nats.svc.cluster.local:4222
    requestTimeoutMs: 5000
    discoveryTimeoutMs: 1500
    # auth:
    #   existingSecret:
    #     name: nats-admin-creds
    #     userKey: user
    #     passwordKey: password

# Each entry becomes a `[[notify]]` block in the rendered settings.toml.
# `provider` selects the webhook flavor (slack | mattermost | matrix —
# matrix assumes a Slack-compat bridge like matrix-hookshot).
# The URL is supplied via exactly one of:
#
#   url: https://chat.example.com/hooks/abc…    # inline, lands in ConfigMap
#
#   urlSecret:                                  # recommended for production
#     name: cheshmhayash-notify
#     key: url
#
# Inline URLs are visible to anyone who can read the ConfigMap; use
# `urlSecret` when the webhook is sensitive.
notify: []
# - provider: mattermost
#   url: https://chat.example.com/hooks/abcdef
#   channel: "#nats-events"
#   username: cheshmhayash

# ---- authentication --------------------------------------------------------
# OIDC for the HTTP API + static bearer keys for the /mcp HTTP transport.
# When `enabled` is false (default) the dashboard stays open exactly like
# before this section was added. MCP keys work independently — list any
# entry under `mcpKeys` to require a bearer token on /mcp, regardless of
# whether OIDC is on.
#
# The `mcp*` keys below configure the /mcp endpoint, which is now served by
# the separate MCP workload (`mcp.enabled` above), not the dashboard. They
# have no effect unless `mcp.enabled: true`.
#
# Sensitive fields (`oidc.clientSecret`, `session.secret`, MCP key values)
# are sourced from a Secret. The chart can either create + populate that
# Secret from inline values, or reference an existing one — same pattern
# as the cluster auth block above.
auth:
  enabled: false
  # How requests are authenticated when `enabled`:
  #   "oidc" (default) — cheshmhayash runs the login flow and issues a
  #                      signed session cookie. Needs oidc.clientId,
  #                      oidc.redirectUrl, oidc.clientSecret and session.secret.
  #   "jwt"            — no login flow. A "builtin oauth" gateway in front of
  #                      cheshmhayash issues the access token; the app verifies
  #                      the `Authorization: Bearer <jwt>` on every request
  #                      against oidc.issuer (JWKS) and reads its claims for the
  #                      same access/admin allowlists. Only oidc.issuer + the
  #                      access allowlist are required; client credentials,
  #                      redirectUrl and session secret are unused.
  mode: oidc
  oidc:
    issuer: ""
    clientId: ""
    redirectUrl: ""
    scopes:
      - openid
      - profile
      - email
    # Use exactly one of the two below.
    # `clientSecret` is written into the chart-managed Secret.
    clientSecret: ""
    # existingClientSecret:
    #   name: cheshmhayash-oidc
    #   key: client_secret
  access:
    # Sign-in allowlist — at least one of these three must be non-empty
    # when `auth.enabled`. Everyone who matches may open the dashboard and
    # read; write access is granted separately by `access.admin` below.
    allowedEmails: []
    allowedDomains: []
    allowedGroups: []
    groupsClaim: groups
    # Write-access (admin) allowlist. A signed-in user who additionally
    # matches anything here gets the "admin" role (full read + write);
    # everyone else who passes the sign-in allowlist above is read-only.
    # Leave all three empty to grant every signed-in user full access
    # (the legacy, pre-role behaviour).
    admin:
      allowedEmails: []
      allowedDomains: []
      allowedGroups: []
  session:
    ttlSeconds: 43200
    cookieName: cheshmhayash_session
    # Set true behind HTTPS so the cookie is only sent over TLS.
    secure: true
    # Required when auth.enabled. Inline -> chart-managed Secret.
    secret: ""
    # existingSecret:
    #   name: cheshmhayash-session
    #   key: session_secret
  # MCP HTTP bearer tokens. Each entry must declare `name` (free-form
  # label, shows up in logs) plus exactly one of `value` (inline) or
  # `existingSecret: {name, key}`. Leave the list empty to keep /mcp
  # un-authenticated like before.
  mcpKeys: []
  # - name: ci-bot
  #   value: replace-me
  # - name: ops-bot
  #   existingSecret:
  #     name: cheshmhayash-mcp
  #     key: ops-bot

  # Options for `mode: jwt`. Nothing here is secret, so it rides in the
  # ConfigMap, not the Secret.
  jwt:
    # Optional — accepted `aud` values (RFC 8707). Empty accepts any token the
    # issuer signed, which is fine when the gateway is the sole ingress and
    # strips a client-supplied Authorization header.
    audiences: []

  # OAuth 2.0 / OIDC auth for the /mcp HTTP transport (MCP authorization
  # spec). When enabled, /mcp accepts access-token JWTs from the SAME issuer
  # as `oidc` above (validated + audience-checked, then run through the same
  # `access` allowlist), and advertises Protected Resource Metadata so MCP
  # clients self-discover the IdP. Requires `auth.enabled`. Static `mcpKeys`
  # keep working alongside it. Nothing here is secret, so it rides in the
  # ConfigMap, not the Secret.
  mcpOauth:
    enabled: false
    # Canonical URI of this MCP endpoint (RFC 8707) — also the accepted token
    # audience. Keycloak must mint access tokens whose `aud` includes it
    # (add an audience mapper / client scope), or every token is rejected.
    resource: ""
    # Optional — defaults to [oidc.issuer].
    authorizationServers: []
    # Optional — accepted `aud` values, defaults to [resource].
    audiences: []
    # Accept any same-issuer token regardless of `aud` (signature, issuer,
    # expiry and the access allowlist still apply). Drops the RFC 8707
    # confused-deputy protection — only for IdPs that can't mint resource
    # audiences (e.g. a Keycloak client without an audience mapper).
    skipAudienceCheck: false

  # Third /mcp auth path (besides mcpKeys and mcpOauth): accept a bearer JWT
  # and read its identity claims WITHOUT verifying the token — no signature,
  # issuer, audience, or expiry check. Claims still pass through the `access`
  # allowlists to resolve a role, but anyone reaching /mcp directly can forge
  # them. Only enable behind a trusted gateway that already validated the
  # token. Requires `auth.enabled`.
  mcpJwt:
    enabled: false

# Extra environment variables to inject into the container.
extraEnv: []
# - name: LOG_LEVEL
#   value: debug

# Extra envFrom sources (Secret/ConfigMap).
extraEnvFrom: []

# Extra arbitrary volumes / mounts (e.g. a TLS bundle to trust).
extraVolumes: []
extraVolumeMounts: []

# Sidecars and init containers — left empty by default.
extraContainers: []
initContainers: []

# When set, the chart adds an extra deployment annotation derived from
# the resolved settings.toml so config changes trigger a rollout.
restartOnConfigChange: true

# Service monitor for kube-prometheus-stack. The app currently exposes no
# /metrics endpoint, so this is off by default — flip when you add one.
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  path: /metrics
  labels: {}
