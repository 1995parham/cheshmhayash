apiVersion: v2
name: cheshmhayash-chart
description: NATS administration dashboard served over the NATS protocol itself.
type: application

# Chart version — bump on every chart change (independent of appVersion).
version: 1.0.0

# Application version — matches the cheshmhayash binary release.
appVersion: "0.5.0"

# Lower bound for the Kubernetes API. Tracks the in-support minors.
kubeVersion: ">=1.34.0-0"

home: https://github.com/1995parham/cheshmhayash
sources:
  - https://github.com/1995parham/cheshmhayash
icon: https://raw.githubusercontent.com/1995parham/cheshmhayash/main/banner.png
keywords:
  - nats
  - jetstream
  - admin
  - dashboard
  - panel
  - monitoring

maintainers:
  - name: Parham Alvani
    url: https://github.com/1995parham
    email: parham.alvani@gmail.com

annotations:
  artifacthub.io/category: monitoring
  artifacthub.io/license: MIT
  artifacthub.io/links: |
    - name: source
      url: https://github.com/1995parham/cheshmhayash
    - name: nats.io
      url: https://nats.io
  artifacthub.io/changes: |
    - kind: changed
      description: Modernize chart — full app.kubernetes.io/* labels, restricted-PSS securityContext, startup probe, HPA v2, PDB, optional NetworkPolicy.
    - kind: added
      description: TOML config rendered via ConfigMap; NATS auth via chart-managed or existing Secret (user/password or .creds file).
