apiVersion: v2
name: cheshmhayash-chart
description: NATS administration dashboard served over the NATS protocol itself.
type: application

# Chart version — bump on every chart change (independent of appVersion).
version: 1.5.0

# Application version — matches the cheshmhayash binary release. The
# release.yaml workflow rewrites this to the pushed tag's version.
appVersion: "0.10.0"

# Lower bound for the Kubernetes API. autoscaling/v2 is the strictest
# requirement (GA in 1.23). The chart is tested against the in-support
# minors but doesn't need newer APIs.
kubeVersion: ">=1.23.0-0"

home: https://github.com/1995parham/cheshmhayash
sources:
  - https://github.com/1995parham/cheshmhayash
icon: https://raw.githubusercontent.com/1995parham/cheshmhayash/main/banner.png
keywords:
  - nats
  - jetstream
  - admin
  - dashboard
  - panel
  - monitoring

maintainers:
  - name: Parham Alvani
    url: https://github.com/1995parham
    email: parham.alvani@gmail.com

annotations:
  artifacthub.io/category: monitoring
  artifacthub.io/license: MIT
  artifacthub.io/links: |
    - name: source
      url: https://github.com/1995parham/cheshmhayash
    - name: nats.io
      url: https://nats.io
  artifacthub.io/changes: |
    - kind: added
      description: "JWT auth mode for the dashboard: the new `auth.mode` (oidc | jwt) lets cheshmhayash sit behind a builtin-oauth gateway. In `jwt` mode it runs no login flow and validates the `Authorization: Bearer` access-token JWT on every request against `auth.oidc.issuer` (JWKS), driving the same access/admin allowlists. Optional `auth.jwt.audiences` restricts accepted `aud` values. The `oidc` cookie login flow remains the default; jwt mode needs only the issuer + allowlist (no client credentials or session secret)."
